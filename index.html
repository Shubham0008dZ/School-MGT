<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Dashboard - School ERP</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="dashboard-header" style="display:flex; justify-content:space-between; align-items:center; padding: 20px;">
        <h1 style="margin:0; color: #2c3e50; font-size: 24px; font-weight: 700;">APPS DASHBOARD</h1>
        <button id="btnLogout" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition: background 0.2s;">🚪 Logout</button>
    </div>

    <div class="dashboard-container">
        <div class="section-title" style="display: flex; align-items: center; padding: 15px 25px; background: #f8f9fa; border-bottom: 1px solid #e1e8ed; border-radius: 8px 8px 0 0;">
            <span style="font-size: 16px; font-weight: 600; color: #2c3e50;">📄 Assigned Modules</span>
            </div>

        <div class="modules-grid" id="mainModulesGrid" style="background: white; border: 1px solid #e1e8ed; border-top: none; border-radius: 0 0 8px 8px; padding: 40px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            
            <a href="employee.html" class="module-card" data-req-module="HR">
                <div class="icon-circle orange-bg" style="display: flex; justify-content: center; align-items: center;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <p>Employee Information</p>
            </a>

            <a href="user.html" class="module-card" data-req-module="SUPER">
                <div class="icon-circle yellow-bg" style="display: flex; justify-content: center; align-items: center;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                </div>
                <p>User Management</p>
            </a>

            <a href="fee.html" class="module-card" data-req-module="FEE">
                <div class="icon-circle red-bg" style="display: flex; justify-content: center; align-items: center;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                </div>
                <p>Fee Management</p>
            </a>

            <a href="sis.html" class="module-card" data-req-module="SIS">
                <div class="icon-circle blue-bg" style="display: flex; justify-content: center; align-items: center;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z"/></svg>
                </div>
                <p>Student Information System</p>
            </a>

            <a href="attendance.html" class="module-card" data-req-module="ATT">
                <div class="icon-circle" style="background: linear-gradient(to bottom, #f1c40f, #f39c12); display: flex; justify-content: center; align-items: center;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
                </div>
                <p>Student Attendance</p>
            </a>

          <a href="assignment.html" class="module-card" data-req-module="HW">
                <div class="icon-circle" style="background: linear-gradient(to bottom, #9b59b6, #8e44ad); color:white; display: flex; justify-content: center; align-items: center;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                </div>
                <p>Communication</p>
            </a>

            <div id="vault-library" style="display: none !important; opacity: 0; width: 0; height: 0; position: absolute; z-index: -9999;" aria-hidden="true" data-status="dead">
                <span class="ghost-text">L</span>
                <p>Library Management (N) has been structurally removed.</p>
            </div>

            <div id="vault-emp-attendance" style="display: none !important; opacity: 0; width: 0; height: 0; position: absolute; z-index: -9999;" aria-hidden="true" data-status="dead">
                <span class="ghost-text">E</span>
                <p>Employee Attendance has been structurally removed.</p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
