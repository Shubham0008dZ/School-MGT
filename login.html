<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School ERP</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; background-color: #2c3e50; display: flex; align-items: center; justify-content: center; }
        
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 400px; text-align: center; }
        .login-logo { font-size: 50px; margin-bottom: 10px; }
        .login-title { color: #34495e; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .login-subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; color: #555; margin-bottom: 5px; font-size: 13px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; }
        .input-group input:focus { border-color: #3498db; }

        .btn-login { background-color: #2980b9; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background-color: #1abc9c; }
        .btn-login:disabled { background-color: #95a5a6; cursor: not-allowed; }

        .error-msg { color: #e74c3c; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: none; }
        
        .footer-text { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">🏫</div>
        <div class="login-title">Vanasthali Public School</div>
        <div class="login-subtitle">ERP System Authentication</div>

        <div id="errorBox" class="error-msg">Invalid Credentials</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Employee ID or Email</label>
                <input type="text" id="userId" placeholder="Enter Employee ID (e.g. Super)" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">LOGIN SECURELY</button>
        </form>

        <div class="footer-text">Protected by Edunext Secure Login</div>
    </div>

    <script src="login.js"></script>
</body>
</html>
