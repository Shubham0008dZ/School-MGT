<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework & Assignment - ERP</title>
    <link rel="stylesheet" href="assignment.css">
</head>
<body>

<div class="top-navbar">
    <div class="top-left">
        <a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 15px;">
            <span class="school-logo" style="font-size: 24px; cursor: pointer;">🏫</span> 
            <span class="school-name" style="font-weight: bold; cursor: pointer;">Vinayak International Associates</span>
        </a>
    </div>
    <div class="top-center"><input type="text" placeholder="Global Search..." class="global-search"></div>
    <div class="top-right" style="display:flex; align-items:center; gap:15px;">
        <span>⚏ Assignment Module 🔔</span>
        <button id="btnLogout" style="background:#e74c3c; color:white; border:none; padding:6px 12px; border-radius:3px; cursor:pointer; font-weight:bold;">🚪 Logout</button>
    </div>
</div>

<div class="erp-wrapper">
    <div class="sidebar hw-sidebar">
        <div class="sidebar-header hw-header"><h2>📚 EDUNEXT</h2></div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-btn"><span class="nav-icon">🏠</span><span class="nav-text"> Dashboard</span></a></li>
            <li><a href="#" class="nav-btn active" data-target="module-add-hw"><span class="nav-icon">➕</span><span class="nav-text"> Upload Assignment</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div id="module-add-hw" class="app-module active-module">
            <div class="profile-header">
                <h2>UPLOAD NEW HOMEWORK / ASSIGNMENT</h2>
            </div>
            
            <div class="form-container">
                <form id="assignmentForm">
                    <div class="form-row">
                        <div class="input-group">
                            <label>Academic Year <span style="color:red;">*</span></label>
                            <select id="acadYear" required>
                                <option value="2026-2027">2026-2027</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Assignment Date <span style="color:red;">*</span></label>
                            <input type="date" id="hwDate" required>
                        </div>
                        <div class="input-group">
                            <label>Class <span style="color:red;">*</span></label>
                            <select id="hwClass" required>
                                <option value="">Select Class</option>
                                </select>
                        </div>
                        <div class="input-group">
                            <label>Section <span style="color:red;">*</span></label>
                            <select id="hwSection" required>
                                <option value="">Select Section</option>
                                </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Subject</label>
                            <select id="hwSubject">
                                <option value="">Select Subject</option>
                                <option value="English">English</option>
                                <option value="Hindi">Hindi</option>
                                <option value="Mathematics">Mathematics</option>
                                <option value="Science">Science</option>
                                <option value="Social Science">Social Science</option>
                                <option value="Computer">Computer</option>
                                <option value="General Knowledge">General Knowledge</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Assignment Type <span style="color:red;">*</span></label>
                            <select id="hwType" required>
                                <option value="">Select Assignment Type</option>
                                <option value="Homework">Homework</option>
                                <option value="Classwork">Classwork</option>
                                <option value="Holiday Homework">Holiday Homework</option>
                                <option value="Assignment">Assignment</option>
                                <option value="Project">Project</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="input-group" style="flex:2;">
                            <label>Assignment Name <span style="color:red;">*</span></label>
                            <input type="text" id="hwName" placeholder="Enter Assignment Name" required>
                        </div>
                    </div>

                    <div class="form-row" style="align-items: flex-start;">
                        <div class="input-group" style="flex:1;">
                            <label>Student-wise Assignment</label>
                            <label class="switch">
                                <input type="checkbox" id="hwStudentWise">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="input-group" style="flex:3;">
                            <label>Description</label>
                            <textarea id="hwDesc" placeholder="Enter Description" rows="4" style="resize:vertical;"></textarea>
                        </div>
                    </div>

                    <div class="form-row" style="align-items: center; border-top:1px solid #eee; padding-top:15px; margin-top:10px;">
                        <div class="input-group" style="flex:1;">
                            <label>Attachment</label>
                            <label for="hwFile" class="btn-attach">📎 Add Attachment</label>
                            <input type="file" id="hwFile" hidden>
                            <span id="hwFileName" style="font-size:12px; color:#777; margin-top:5px;">No file selected</span>
                            <input type="hidden" id="hwBase64">
                        </div>
                        <div class="input-group" style="flex:3; padding-left:20px;">
                            <label>Submission Required</label>
                            <label class="switch">
                                <input type="checkbox" id="hwSubmissionReq">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <div class="submit-section">
                        <button type="submit" class="submit-btn" id="btnSaveHw">Save Assignment</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<script src="assignment.js"></script>
</body>
</html>
