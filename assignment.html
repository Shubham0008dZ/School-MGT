<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication & Assignment - ERP</title>
    <link rel="stylesheet" href="assignment.css">
    <style>
        .list-header-box { display:flex; justify-content:space-between; align-items:center; background:white; padding:15px 20px; border-radius:5px; box-shadow:0 2px 5px rgba(0,0,0,0.05); margin-bottom:20px; border-left:4px solid #8e44ad; }
        .list-header-box h2 { color:#2c3e50; font-size:18px; margin:0; }
        .btn-add-new { background:#27ae60; color:white; border:none; padding:8px 20px; border-radius:3px; cursor:pointer; font-weight:bold; font-size:13px; }
        
        .record-card { background:white; border:1px solid #eee; padding:15px; border-radius:5px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; transition:0.3s; }
        .record-card:hover { box-shadow:0 4px 10px rgba(0,0,0,0.05); transform:translateY(-2px); border-color:#3498db;}
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="top-left">
        <a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 15px;">
            <span class="school-logo" style="font-size: 24px; cursor: pointer;">🏫</span> 
            <span class="school-name" style="font-weight: bold; cursor: pointer;">Vinayak International Associates</span>
        </a>
    </div>
    <div class="top-center"><input type="text" placeholder="Global Search..." class="global-search"></div>
    <div class="top-right" style="display:flex; align-items:center; gap:15px;">
        <span>⚏ Communication Module 🔔</span>
        <button id="btnLogout" style="background:#e74c3c; color:white; border:none; padding:6px 12px; border-radius:3px; cursor:pointer; font-weight:bold;">🚪 Logout</button>
    </div>
</div>

<div class="erp-wrapper">
    <div class="sidebar hw-sidebar">
        <div class="sidebar-header hw-header"><h2>📚 EDUNEXT</h2></div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-btn"><span class="nav-icon">🏠</span><span class="nav-text"> Dashboard</span></a></li>
            <li><a href="#" class="nav-btn active" data-target="module-comm-list" data-cat="Circular"><span class="nav-icon">📢</span><span class="nav-text"> Circular / News</span></a></li>
            <li><a href="#" class="nav-btn" data-target="module-comm-list" data-cat="Homework"><span class="nav-icon">📚</span><span class="nav-text"> Homework</span></a></li>
            <li><a href="#" class="nav-btn" data-target="module-comm-list" data-cat="Feedback"><span class="nav-icon">⭐</span><span class="nav-text"> Feedback</span></a></li>
            <li><a href="#" class="nav-btn" data-target="module-comm-list" data-cat="Achievement"><span class="nav-icon">🏆</span><span class="nav-text"> Achievement</span></a></li>
            <li><a href="#" class="nav-btn" data-target="module-comm-list" data-cat="PTM"><span class="nav-icon">🤝</span><span class="nav-text"> PTM Notices</span></a></li>
            <li><a href="#" class="nav-btn" data-target="module-comm-list" data-cat="Remarks"><span class="nav-icon">📝</span><span class="nav-text"> Remarks</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div id="module-comm-list" class="app-module active-module">
            <div class="list-header-box">
                <h2 id="listHeaderTitle">Circular / News Records</h2>
                <button id="btnOpenAddForm" class="btn-add-new">⊕ Add New</button>
            </div>
            
            <div id="commListArea" style="display:flex; flex-direction:column; gap:10px;">
                <p style="text-align:center; padding:20px; color:#777;">Fetching records... ⏳</p>
            </div>
        </div>

        <div id="module-add-hw" class="app-module">
            <div class="profile-header">
                <h2>UPLOAD <span id="formDynamicTitle">COMMUNICATION</span></h2>
                <button class="btn-dark" style="padding:6px 15px;" onclick="document.querySelector('.nav-btn.active').click()">← Back to List</button>
            </div>
            
            <div class="form-container">
                <form id="assignmentForm">
                    <div class="form-row">
                        <div class="input-group">
                            <label>Academic Year <span style="color:red;">*</span></label>
                            <select id="acadYear" required>
                                <option value="2026-2027">2026-2027</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Date <span style="color:red;">*</span></label>
                            <input type="date" id="hwDate" required>
                        </div>
                        <div class="input-group">
                            <label>Class <span style="color:red;">*</span></label>
                            <select id="hwClass" required>
                                <option value="">Select Class</option>
                                <option value="All">All Classes (Global)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Section <span style="color:red;">*</span></label>
                            <select id="hwSection" required>
                                <option value="">Select Section</option>
                                <option value="All">All Sections</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Subject / Category</label>
                            <select id="hwSubject">
                                <option value="">Select Subject/Category</option>
                                <option value="English">English</option>
                                <option value="Hindi">Hindi</option>
                                <option value="Mathematics">Mathematics</option>
                                <option value="Science">Science</option>
                                <option value="General">General (For Circulars)</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Type <span style="color:red;">*</span></label>
                            <select id="hwType" required style="background:#eee; pointer-events:none;">
                                <option value="Circular">Circular</option>
                                <option value="Homework">Homework</option>
                                <option value="Feedback">Feedback</option>
                                <option value="Achievement">Achievement</option>
                                <option value="PTM">PTM</option>
                                <option value="Remarks">Remarks</option>
                            </select>
                        </div>
                        <div class="input-group" style="flex:2;">
                            <label>Title / Topic Name <span style="color:red;">*</span></label>
                            <input type="text" id="hwName" placeholder="Enter Title" required>
                        </div>
                    </div>

                    <div class="form-row" style="align-items: flex-start;">
                        <div class="input-group" style="flex:1;">
                            <label>Student-wise Only?</label>
                            <label class="switch">
                                <input type="checkbox" id="hwStudentWise">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="input-group" style="flex:3;">
                            <label>Detailed Description</label>
                            <textarea id="hwDesc" placeholder="Enter full details here..." rows="4" style="resize:vertical;"></textarea>
                        </div>
                    </div>

                    <div class="form-row" style="align-items: center; border-top:1px solid #eee; padding-top:15px; margin-top:10px;">
                        <div class="input-group" style="flex:1;">
                            <label>Attachment (Optional)</label>
                            <label for="hwFile" class="btn-attach">📎 Add Attachment</label>
                            <input type="file" id="hwFile" hidden>
                            <span id="hwFileName" style="font-size:12px; color:#777; margin-top:5px;">No file selected</span>
                            <input type="hidden" id="hwBase64">
                        </div>
                        <div class="input-group" style="flex:3; padding-left:20px;">
                            <label>Submission Required (For HW)</label>
                            <label class="switch">
                                <input type="checkbox" id="hwSubmissionReq">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <div class="submit-section">
                        <button type="submit" class="submit-btn" id="btnSaveHw">Save Entry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="assignment.js"></script>
</body>
</html>
